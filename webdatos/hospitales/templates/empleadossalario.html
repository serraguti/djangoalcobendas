<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Empleados salario</h1>
    <form method="post">
        {% csrf_token %}
        Introduzca salario:
        <input type="number" name="cajasalario"/>
        <button>Buscar empleados</button>
    </form>
    <table border="1">
        <thead>
            <tr>
                <th>Apellido</th>
                <th>Oficio</th>
                <th>Salario</th>
            </tr>
        </thead>
        <tbody>
            {% for emp in empleados %}
                <tr>
                    <td>{{emp.apellido}}</td>
                    <td>{{emp.oficio}}</td>
                    <td>{{emp.salario}}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
